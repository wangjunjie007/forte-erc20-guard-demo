name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  unit-and-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Install OS deps
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Show tool versions
        run: |
          node -v
          npm -v
          forge --version

      - name: Install npm dependencies
        run: npm install --no-audit --no-fund

      - name: Install forge-std
        run: forge install foundry-rs/forge-std --no-commit

      - name: Run Foundry tests
        run: npm test

      - name: Run integration rebuild
        run: npm run check:integration

      - name: Assert applied policy state
        run: npm run check:policy
